load_env default
load_env grub2win_chosen
set grub2win_version=3.0.2.2
set grub2win_langauto=yes
load_env grub2win_reboot
if [ ! $grub2win_reboot = no ] ; then set default=$grub2win_reboot ; set grub2win_reboot=no ; save_env grub2win_reboot ; fi
set timeout=10
set lang=en
set pager=1
set icondir=$prefix/themes/lobocorp/icons ; $prefix/themes/icons is the default
set locale_dir=$prefix/locale
if [ -z $grub2win_funcstatus ] ; then source $prefix/g2bootmgr/gnugrub.functions.cfg ; fi 
g2wbits 
set grub2win_custmode=EFI
set grub2win_lastbooted=yes
set grub2win_efilevel=166
set grub2win_efiboot=gnugrub.kernel64.efi
set grub2win_efiuuid=D41E-B682
