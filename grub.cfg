#
#  Menu Entry 0       Windows EFI Boot Manager
#
menuentry   'Windows (HackBGRT)                                 Hotkey=h               '   --hotkey=h    --class windows   --class icon-windows  {
     set reviewpause=5
     set pager=0
     set efibootmgr=/EFI/HackBGRT/loader.efi
     getpartition  file  $efibootmgr  root
     if [ $? = 0 ] ; then
         echo Grub is now loading HackBGRT
         echo Boot disk address is    $root
         echo The boot mode is        Windows EFI (HackBGRT)
         chainloader $efibootmgr
     fi
     g2wsleep
     savelast 0 'Windows (HackBGRT)'
}

menuentry   'Windows EFI Boot Manager                            Hotkey=w               '   --hotkey=w    --class windows   --class icon-windows  {
     set reviewpause=5
     set pager=0
     set efibootmgr=/efi/Microsoft/Boot/bootmgfw.efi
     getpartition  file  $efibootmgr  root
     if [ $? = 0 ] ; then
         echo Grub is now loading the Windows EFI Boot Manager
         echo Boot disk address is    $root
         echo The boot mode is        Windows EFI
         chainloader $efibootmgr
     fi
     g2wsleep
     savelast 0 'Windows EFI Boot Manager'
}


# All the following classes have been modified for the custom theme
#
#  Menu Entry 1       Boot Information and Utilities
#
menuentry   'Boot Information and Utilities                      Hotkey=b               '   --hotkey=b    --class efi   --class icon-efi  {
     unset reviewpause
     g2wbootinfo
}


#
#  Menu Entry 2       Shutdown the system
#
menuentry   'Shutdown the system                                 Hotkey=s               '   --hotkey=s    --class shutdown   --class icon-shutdown  {
     unset reviewpause
     g2wutil halt
}


#
#  Menu Entry 3       Reboot your system
#
menuentry   'Reboot your system                                  Hotkey=r               '   --hotkey=r    --class restart   --class icon-restart  {
     unset reviewpause
     g2wutil reboot
}


#
#  Menu Entry 4       Boot to your EFI firmware
#
menuentry   'Boot to your EFI firmware                           Hotkey=f               '   --hotkey=f    --class SystemRescueCD   --class icon-SystemRescueCD  {
     unset reviewpause
     g2wutil fwsetup
}


